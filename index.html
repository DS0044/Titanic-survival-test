<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Titanic Survival Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: #fff;
            text-align: center;
            padding: 40px;
        }
        h1 {
            margin-bottom: 20px;
        }
        form {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 10px;
            display: inline-block;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }
        input, select {
            padding: 8px;
            width: 200px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }
        button {
            background-color: #00c6ff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0072ff;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Titanic Survival Prediction</h1>
    <form action="/predict" method="POST">
        <label for="Pclass">Passenger Class (1-3):</label>
        <input type="number" name="Pclass" min="1" max="3" required>

        <label for="Sex">Sex (0 = Female, 1 = Male):</label>
        <input type="number" name="Sex" min="0" max="1" required>

        <label for="Fam_type">Family Type (0 = Alone, 1 = Small, 2 = Large):</label>
        <input type="number" name="Fam_type" min="0" max="2" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
    <div class="result">{{ prediction_text }}</div>
    {% endif %}
</body>
</html>
